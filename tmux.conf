set -g default-terminal "screen-256color"
set-option -gw xterm-keys on

# Modern macOS doesn't need reattach-to-user-namespace
set -g default-command "zsh"

# Use native clipboard (works on modern macOS and with tmux 2.6+)
bind C-c run "tmux show-buffer | pbcopy"
bind C-v run "pbpaste | tmux load-buffer - && tmux paste-buffer"

bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

set-option -g prefix C-a

# set -g utf8 on
# set -g status-utf8 on

unbind-key C-b
bind-key C-a send-prefix

# 1 is better than 0
set -g base-index 1
setw -g pane-base-index 1

# terminal names
set -g set-titles on

set -g mouse on

# Toggle mouse on with ^B m
bind m \
  set -g mouse on \;\
  display 'Mouse: ON'

# Toggle mouse off with ^B M
bind M \
  set -g mouse off \;\
  display 'Mouse: OFF'


# activity monitor
setw -g monitor-activity on
set -g visual-activity on

# active window colors (modern syntax)
setw -g window-status-current-style fg=white,bg=blue,bright

# better highlighting of active pane
set-option -g pane-active-border-style fg=blue

# set -g window-active-style 'bg=#222222'
# set -g window-style 'bg=#333333'

# new-session default

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'nhdaly/tmux-scroll-copy-mode'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'git@github.com/user/plugin'
# set -g @plugin 'git@bitbucket.com/user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
